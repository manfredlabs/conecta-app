workflows:
  ios-release:
    name: iOS Release Build
    instance_type: mac_mini_m2
    environment:
      flutter: 3.41.6
      xcode: latest
      groups:
        - ios_credentials
      ios_signing:
        provisioning_profiles:
          - conecta
        certificates:
          - conecta-ios
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Set up code signing
        script: |
          xcode-project use-profiles \
            --project ios/Runner.xcodeproj
      - name: Build
        script: |
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist
    artifacts:
      - build/ios/ipa/**/*.ipa
    publishing:
      app_store_connect:
        api_key: conecta
        key_id: 66688K36LJ
        issuer_id: 7efa127e-f0c6-44cd-8636-19080f38a227
        submit_to_testflight: false
