workflows:
  ios-release:
    name: iOS Release Build
    instance_type: mac_mini_m2
    environment:
      flutter: 3.41.6
      xcode: latest
      ios_signing:
        provisioning_profiles:
          - conecta
        certificates:
          - conecta-ios
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Set up code signing
        script: |
          xcode-project use-profiles \
            --project ios/Runner.xcodeproj
      - name: Build
        script: |
          flutter build ipa --release \
            --export-method=app-store
    artifacts:
      - build/ios/ipa/**/*.ipa
