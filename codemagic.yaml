workflows:
  ios-release:
    name: iOS Release Build
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        provisioning_profiles:
          - conecta
        certificates:
          - conecta-distribution
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Build
        script: |
          flutter build ipa --release
    artifacts:
      - build/ios/ipa/**/*.ipa
